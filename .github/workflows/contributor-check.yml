name: Contributor Check

on:
  pull_request_target:
    types: [opened]
  issues:
    types: [opened]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: microsoft/agent-governance-toolkit/.github/actions/contributor-check@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          target-repo: lawcontinue/hippo
